<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ITD110 Lab 3 — Manage students and ENROLLED_IN course relationships in Neo4j.">
    <title>Student Management System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <aside class="sidebar" aria-label="Site navigation">
        <div class="sidebar-header">
            <h2>Management System</h2>
            <p class="sidebar-tagline">ITD110 · Neo4j graph</p>
        </div>
        <ul class="sidebar-nav">
            <li><a href="index.html" class="active"><span class="icon">&#128218;</span> Students</a></li>
            <li><a href="faculty.html"><span class="icon">&#128100;</span> Faculty</a></li>
            <li><a href="course.html"><span class="icon">&#128214;</span> Courses</a></li>
        </ul>
    </aside>

    <main id="main" class="main-content">
        <div class="container">
            <h1>Student Management System</h1>
            <div id="status" class="status hidden" role="status" aria-live="polite"></div>

            <div class="form-container">
                <h2 id="form-title">Add New Student</h2>
                <form id="student-form">
                    <input type="hidden" id="student-id">
                    <div class="form-group">
                        <label for="student-id-field">Student ID</label>
                        <input type="text" id="student-id-field" name="studentId" required>
                    </div>
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="courses">Enrolled Courses (Hold Ctrl/Cmd to select multiple)</label>
                        <select id="courses" name="courses" multiple aria-describedby="courses-hint"></select>
                        <p id="courses-hint" class="field-hint">Loading courses…</p>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="submit-btn">Add Student</button>
                        <button type="button" id="cancel-btn" class="hidden">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <h2>Student List</h2>
                <div class="table-scroll" id="students-table-wrap">
                <table id="students-table">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Courses</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="students-tbody"></tbody>
                </table>
                </div>
                <p id="no-students" class="empty-state hidden" role="status">No students yet. Fill out the form above and click <strong>Add Student</strong>.</p>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
