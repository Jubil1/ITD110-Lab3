<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ITD110 Lab 3 — Manage faculty and TEACHES course relationships in Neo4j.">
    <title>Faculty Management System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <aside class="sidebar" aria-label="Site navigation">
        <div class="sidebar-header">
            <h2>Management System</h2>
            <p class="sidebar-tagline">ITD110 · Neo4j graph</p>
        </div>
        <ul class="sidebar-nav">
            <li><a href="index.html"><span class="icon">&#128218;</span> Students</a></li>
            <li><a href="faculty.html" class="active"><span class="icon">&#128100;</span> Faculty</a></li>
            <li><a href="course.html"><span class="icon">&#128214;</span> Courses</a></li>
        </ul>
    </aside>

    <main id="main" class="main-content">
        <div class="container">
            <h1>Faculty Management System</h1>
            <div id="status" class="status hidden" role="status" aria-live="polite"></div>

            <div class="form-container">
                <h2 id="form-title">Add New Faculty</h2>
                <form id="faculty-form">
                    <input type="hidden" id="faculty-id">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <input type="text" id="address" name="address" required>
                    </div>
                    <div class="form-group">
                        <label for="department">Department</label>
                        <input type="text" id="department" name="department" required>
                    </div>
                    <div class="form-group">
                        <label for="courses">Teaching Load (Hold Ctrl/Cmd to select multiple)</label>
                        <select id="courses" name="courses" multiple aria-describedby="courses-hint"></select>
                        <p id="courses-hint" class="field-hint">Loading courses…</p>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="submit-btn">Add Faculty</button>
                        <button type="button" id="cancel-btn" class="hidden">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <h2>Faculty List</h2>
                <div class="table-scroll" id="faculty-table-wrap">
                <table id="faculty-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Address</th>
                            <th>Department</th>
                            <th>Courses</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="faculty-tbody"></tbody>
                </table>
                </div>
                <p id="no-faculty" class="empty-state hidden" role="status">No faculty yet. Use the form above to add your first record.</p>
            </div>
        </div>
    </main>

    <script src="js/faculty.js"></script>
</body>
</html>
